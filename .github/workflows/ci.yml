name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Syntax-check all tracked Python
        run: |
          files=$(git ls-files '*.py' | grep -v -E '\.venv/|site-packages/' || true)
          echo "$files"
          if [ -n "$files" ]; then python -m py_compile $files; fi

      - name: exploitgym-eval unit tests
        working-directory: exploitgym-eval
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          python tests/test_aggregate.py
